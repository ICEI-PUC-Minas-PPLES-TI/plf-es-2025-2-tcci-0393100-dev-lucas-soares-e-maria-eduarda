<svg width="420" height="120" viewBox="0 0 420 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gt-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0891b2" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="gt-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0891b2" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>

  <!-- Logo (graph diamond), scaled and centered vertically -->
  <g transform="translate(20, 27) scale(1.0)">
    <!-- Outer diamond edges -->
    <line x1="30" y1="5"  x2="5"  y2="33" stroke="url(#gt-grad)" stroke-width="1.8" stroke-linecap="round" />
    <line x1="30" y1="5"  x2="55" y2="33" stroke="url(#gt-grad)" stroke-width="1.8" stroke-linecap="round" />
    <line x1="5"  y1="33" x2="30" y2="61" stroke="url(#gt-grad)" stroke-width="1.8" stroke-linecap="round" />
    <line x1="55" y1="33" x2="30" y2="61" stroke="url(#gt-grad)" stroke-width="1.8" stroke-linecap="round" />

    <!-- Internal edges to hub -->
    <line x1="30" y1="5"  x2="30" y2="36" stroke="url(#gt-grad)" stroke-width="1.8" stroke-linecap="round" />
    <line x1="5"  y1="33" x2="30" y2="36" stroke="url(#gt-grad)" stroke-width="1.8" stroke-linecap="round" />
    <line x1="55" y1="33" x2="30" y2="36" stroke="url(#gt-grad)" stroke-width="1.8" stroke-linecap="round" />
    <line x1="30" y1="36" x2="30" y2="61" stroke="url(#gt-grad)" stroke-width="1.8" stroke-linecap="round" />

    <!-- Outer nodes -->
    <circle cx="30" cy="5"  r="3.5" fill="url(#gt-grad)" />
    <circle cx="5"  cy="33" r="3.5" fill="url(#gt-grad)" />
    <circle cx="55" cy="33" r="3.5" fill="url(#gt-grad)" />

    <!-- Hub node -->
    <circle cx="30" cy="36" r="4.5" fill="url(#gt-grad)" />

    <!-- Bottom focal node -->
    <circle cx="30" cy="61" r="5.5" fill="url(#gt-grad)" />
  </g>

  <!-- Wordmark -->
  <text x="100" y="60" dominant-baseline="central"
        font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="46" font-weight="700" fill="url(#gt-text)">GraphTest</text>
</svg>
